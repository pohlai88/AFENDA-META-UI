name: CI Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 10.33.0
  NODE_VERSION: 22.x
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_LOG_ORDER: grouped

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false
      - name: Enable Corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Audit high severity vulnerabilities
        run: pnpm ci:deps:audit

      - name: Run dependency governance gate
        run: pnpm ci:gate:dependencies

  governance:
    name: System Integrity Gates
    needs: setup
    runs-on: ubuntu-latest
    env:
      AFENDA_PROMOTION_CONTEXT: production-candidate
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false
      - name: Enable Corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Typecheck core
        run: pnpm --filter @afenda/core typecheck

      - name: Deterministic generation
        run: pnpm generate && git diff --exit-code

      - name: Cache turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.ref }}-
            turbo-${{ runner.os }}-

      - name: Run comprehensive CI gates (8/8)
        run: pnpm ci:gate
        continue-on-error: false

      - name: Meta-types export snapshot gate
        run: pnpm ci:gate:exports
        continue-on-error: false

      - name: Truth schema drift gate
        run: pnpm ci:gate:truth-schema-drift
        continue-on-error: false

      - name: Policy contract consistency gate
        run: pnpm ci:policy:contract-consistency
        continue-on-error: false

      - name: Bounded-context command tests
        run: pnpm ci:api:command-bounded-context
        continue-on-error: false

      - name: Projection replay checks
        run: pnpm ci:api:projection-replay
        continue-on-error: false

      - name: Release governance checks
        run: pnpm ci:release:governance
        continue-on-error: false

      - name: Non-sales promotion gate checks
        run: pnpm ci:promotion:non-sales
        continue-on-error: false

      - name: Non-sales parity execution checks
        run: pnpm ci:parity:non-sales
        continue-on-error: false

      - name: Organization promotion checklist automation
        run: pnpm ci:promotion:organization:checklist
        continue-on-error: false

  lint:
    name: Lint & Type Check
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false
      - name: Enable Corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Cache turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.ref }}-
            turbo-${{ runner.os }}-

      - name: Run ESLint
        run: pnpm lint ${{ github.event_name == 'pull_request' && '--affected' || '' }}
        continue-on-error: true

      - name: TypeScript strict check
        run: pnpm typecheck ${{ github.event_name == 'pull_request' && '--affected' || '' }}
        continue-on-error: true

  test:
    name: Unit Tests
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false
      - name: Enable Corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Cache turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.ref }}-
            turbo-${{ runner.os }}-

      - name: Setup Neon test database
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node tools/scripts/setup-test-db.mjs --ci
        continue-on-error: false

      - name: Verify seed clear order vs FK graph
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL_MIGRATIONS }}
        run: pnpm --filter @afenda/db verify:clear-plan
        continue-on-error: false

      - name: Canonical seed baseline (snapshot + seed contract)
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL_MIGRATIONS }}
        run: pnpm --filter @afenda/db db:seed -- --scenario=baseline
        continue-on-error: false

      - name: Run Vitest
        env:
          TEST_DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
        run: pnpm test ${{ github.event_name == 'pull_request' && '--affected' || '' }}
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          fail_ci_if_error: false

      - name: Cleanup test database
        if: always()
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          TEST_NEON_BRANCH_ID: ${{ env.TEST_NEON_BRANCH_ID }}
        run: |
          if [ -n "$TEST_NEON_BRANCH_ID" ]; then
            echo "🗑️  Deleting test database branch: $TEST_NEON_BRANCH_ID"
            curl -X DELETE "https://console.neon.tech/api/v2/projects/${{ secrets.NEON_PROJECT_ID }}/branches/$TEST_NEON_BRANCH_ID" \
              -H "Authorization: Bearer $NEON_API_KEY" \
              -H "Accept: application/json" || echo "⚠️  Failed to delete test branch (may have been manually deleted)"
          fi

  build:
    name: Build
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false
      - name: Enable Corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Cache turbo
        uses: actions/cache@v5
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.ref }}-
            turbo-${{ runner.os }}-

      - name: Vite configuration gate
        run: pnpm ci:gate:vite
        continue-on-error: false

      - name: Build all packages
        run: pnpm turbo run build ${{ github.event_name == 'pull_request' && '--affected' || '' }}
        env:
          CI: true

      - name: Bundle size monitoring
        run: pnpm ci:gate:bundle
        continue-on-error: false

      - name: Generate bundle report
        if: github.event_name == 'pull_request'
        run: pnpm ci:gate:bundle --report > bundle-report.txt

      - name: Comment bundle report on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('bundle-report.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📦 Bundle Analysis\n\n\`\`\`\n${report}\n\`\`\``
            });

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-artifacts
          path: |
            apps/web/dist
            apps/api/dist
          retention-days: 5

  truth_compiler_advisory:
    name: Truth compiler health (advisory)
    needs: setup
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false
      - name: Enable Corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Truth advisory gates (non-blocking)
        env:
          GITHUB_ACTIONS: "true"
        run: pnpm truth:gate:advisory

  r2_preview_smoke:
    name: R2 Preview Smoke (non-blocking)
    needs: setup
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false
      - name: Enable Corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Run R2 health smoke check
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_KEY_PREFIX: ${{ vars.R2_KEY_PREFIX }}
          R2_JURISDICTION: ${{ vars.R2_JURISDICTION }}
        run: |
          if [ -z "$R2_ACCOUNT_ID" ] || [ -z "$R2_ACCESS_KEY_ID" ] || [ -z "$R2_SECRET_ACCESS_KEY" ] || [ -z "$R2_BUCKET_NAME" ]; then
            echo "ℹ️ Skipping R2 smoke check: missing R2_* secrets for this PR context."
            exit 0
          fi
          pnpm --filter @afenda/db r2:health

  quality:
    name: Quality Gate
    needs: [governance, lint, test, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v5

      - name: Check job statuses
        run: |
          if [ "${{ needs.governance.result }}" = "failure" ]; then
            echo "❌ System Integrity Gates failed (boundaries, circular, contracts, dependencies, logger, typescript, bundle, vite)"
            exit 1
          fi
          if [ "${{ needs.lint.result }}" = "failure" ]; then
            echo "❌ Lint jobs failed"
            exit 1
          fi
          if [ "${{ needs.test.result }}" = "failure" ]; then
            echo "❌ Test jobs failed"
            exit 1
          fi
          if [ "${{ needs.build.result }}" = "failure" ]; then
            echo "❌ Build jobs failed"
            exit 1
          fi
          echo "✅ All quality and integrity gates passed"

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const governance = "${{ needs.governance.result }}" === "success" ? "✅" : "❌";
            const lint = "${{ needs.lint.result }}" === "success" ? "✅" : "❌";
            const test = "${{ needs.test.result }}" === "success" ? "✅" : "❌";
            const build = "${{ needs.build.result }}" === "success" ? "✅" : "❌";

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## CI Pipeline Results\n\n| Check | Status |\n|-------|--------|\n| System Integrity | ${governance} |\n| Lint | ${lint} |\n| Tests | ${test} |\n| Build | ${build} |`
            });
