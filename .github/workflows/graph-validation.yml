name: Graph Validation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"
  push:
    branches: [main, master, develop]
    paths:
      - "packages/db/src/graph-validation/**"
      - "packages/db/src/queries/_shared/**"
      - "tools/ci-gate/db-access-layer/**"
      - "tools/ci-gate/graph-validation/**"
      - "packages/db/package.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/graph-validation.yml"
  pull_request:
    branches: [main, master, develop]
    paths:
      - "packages/db/src/graph-validation/**"
      - "packages/db/src/queries/_shared/**"
      - "tools/ci-gate/db-access-layer/**"
      - "tools/ci-gate/graph-validation/**"
      - "packages/db/package.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/graph-validation.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 10.33.0
  NODE_VERSION: 22.x
  MIN_STMT_COVERAGE: "100"
  MIN_BRANCH_COVERAGE: "100"
  MIN_FUNC_COVERAGE: "100"
  MIN_LINE_COVERAGE: "100"

  # Phase 3: Automation - Database validation thresholds
  MIN_HEALTH_SCORE: "70"
  ALERT_HEALTH_SCORE: "80"

jobs:
  graph-validation:
    name: Graph Validation Tests + Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Run graph validation tests
        run: pnpm run db:test:graph-validation

      - name: Run graph guardrail tests
        run: pnpm --filter @afenda/db test:graph-guard

      - name: Run graph validation coverage
        run: pnpm run db:test:graph-validation:coverage | tee .reports-graph-validation-coverage.txt

      - name: Parse coverage metrics
        shell: bash
        run: |
          set -euo pipefail

          COVERAGE_LINE=$(grep -E '^All files[[:space:]]*\|' .reports-graph-validation-coverage.txt | tail -n 1 || true)
          if [ -z "$COVERAGE_LINE" ]; then
            echo "Unable to find 'All files' coverage row in report output."
            exit 1
          fi

          STMT=$(echo "$COVERAGE_LINE" | awk -F'|' '{gsub(/ /, "", $2); print $2}')
          BRANCH=$(echo "$COVERAGE_LINE" | awk -F'|' '{gsub(/ /, "", $3); print $3}')
          FUNC=$(echo "$COVERAGE_LINE" | awk -F'|' '{gsub(/ /, "", $4); print $4}')
          LINE=$(echo "$COVERAGE_LINE" | awk -F'|' '{gsub(/ /, "", $5); print $5}')

          echo "COVERAGE_STMT=$STMT" >> $GITHUB_ENV
          echo "COVERAGE_BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "COVERAGE_FUNC=$FUNC" >> $GITHUB_ENV
          echo "COVERAGE_LINE=$LINE" >> $GITHUB_ENV

      - name: Enforce coverage thresholds
        shell: bash
        run: |
          set -euo pipefail

          awk -v a="$COVERAGE_STMT" -v b="$MIN_STMT_COVERAGE" 'BEGIN { exit (a+0 >= b+0 ? 0 : 1) }' || {
            echo "Statement coverage gate failed: $COVERAGE_STMT < $MIN_STMT_COVERAGE"
            exit 1
          }

          awk -v a="$COVERAGE_BRANCH" -v b="$MIN_BRANCH_COVERAGE" 'BEGIN { exit (a+0 >= b+0 ? 0 : 1) }' || {
            echo "Branch coverage gate failed: $COVERAGE_BRANCH < $MIN_BRANCH_COVERAGE"
            exit 1
          }

          awk -v a="$COVERAGE_FUNC" -v b="$MIN_FUNC_COVERAGE" 'BEGIN { exit (a+0 >= b+0 ? 0 : 1) }' || {
            echo "Function coverage gate failed: $COVERAGE_FUNC < $MIN_FUNC_COVERAGE"
            exit 1
          }

          awk -v a="$COVERAGE_LINE" -v b="$MIN_LINE_COVERAGE" 'BEGIN { exit (a+0 >= b+0 ? 0 : 1) }' || {
            echo "Line coverage gate failed: $COVERAGE_LINE < $MIN_LINE_COVERAGE"
            exit 1
          }

      - name: Upload coverage log
        uses: actions/upload-artifact@v4
        with:
          name: graph-validation-coverage-log
          path: .reports-graph-validation-coverage.txt
          retention-days: 14

      - name: Workflow summary
        run: |
          echo "## Graph Validation CI" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Tests: pnpm run db:test:graph-validation" >> $GITHUB_STEP_SUMMARY
          echo "- Coverage: pnpm run db:test:graph-validation:coverage" >> $GITHUB_STEP_SUMMARY
          echo "- Coverage (All files): statements=$COVERAGE_STMT%, branches=$COVERAGE_BRANCH%, functions=$COVERAGE_FUNC%, lines=$COVERAGE_LINE%" >> $GITHUB_STEP_SUMMARY
          echo "- Thresholds: statements>=$MIN_STMT_COVERAGE%, branches>=$MIN_BRANCH_COVERAGE%, functions>=$MIN_FUNC_COVERAGE%, lines>=$MIN_LINE_COVERAGE%" >> $GITHUB_STEP_SUMMARY
          echo "- Artifact: graph-validation-coverage-log" >> $GITHUB_STEP_SUMMARY

  # Phase 3: Automation - Daily health check and database validation
  graph-validation-health:
    name: Graph Validation Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Only run on schedule (daily 2 AM) or manual trigger in production
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref_protected)
    # This job requires DATABASE_URL secret - configure in GitHub repository settings
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Get pnpm store directory
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Skip check - DATABASE_URL not configured
        if: env.DATABASE_URL == ''
        run: |
          echo "⚠️  Skipping graph validation health check: DATABASE_URL not configured"
          echo "To enable: Add DATABASE_URL secret to GitHub repository environment"

      - name: Run health check (quick overview)
        if: env.DATABASE_URL != ''
        run: |
          mkdir -p .reports/graph-validation
          pnpm --filter @afenda/db graph-validation health | tee .reports/graph-validation/health-check.txt

      - name: Generate detailed validation report
        if: env.DATABASE_URL != ''
        env:
          GRAPH_VALIDATION_SCHEMA_MANIFEST_DIR: ${{ github.workspace }}/.reports/graph-validation
        run: |
          pnpm --filter @afenda/db graph-validation report --format=json --adjuncts --repo-root="${GITHUB_WORKSPACE}" > .reports/graph-validation/validation-report.json

      - name: Strict v1 contract (validate-artifact)
        if: env.DATABASE_URL != ''
        run: pnpm --filter @afenda/db graph-validation:validate-artifact .reports/graph-validation/validation-report.json

      - name: Enforce adjunct policy (optional strict)
        if: env.DATABASE_URL != ''
        env:
          CI_GRAPH_ADJUNCTS_STRICT: ${{ vars.CI_GRAPH_ADJUNCTS_STRICT }}
        run: node tools/ci-gate/graph-validation/check-adjuncts.mjs .reports/graph-validation/validation-report.json

      - name: Assert production truth (v1 JSON, fail-closed)
        if: env.DATABASE_URL != ''
        shell: bash
        env:
          MIN_HEALTH_SCORE: ${{ env.MIN_HEALTH_SCORE }}
        run: |
          set -euo pipefail
          R=".reports/graph-validation/validation-report.json"
          jq -e '.policy.isSecurityBlocking == false' "$R"
          jq -e --argjson min "$MIN_HEALTH_SCORE" '.healthScore.overall >= ($min | tonumber)' "$R"
          jq -e '.tenantLeaks.isSecure == true' "$R"
          jq -e '(.orphans.byPriority.P0 == 0) and (.orphans.byPriority.P1 == 0)' "$R"

      - name: Export FK relationship catalog
        if: env.DATABASE_URL != ''
        run: |
          pnpm --filter @afenda/db graph-validation export-catalog --output=.reports/graph-validation/fk-catalog.json

      - name: Export summary env from validation report (jq)
        if: env.DATABASE_URL != ''
        shell: bash
        env:
          ALERT_HEALTH_SCORE: ${{ env.ALERT_HEALTH_SCORE }}
          MIN_HEALTH_SCORE: ${{ env.MIN_HEALTH_SCORE }}
        run: |
          set -euo pipefail
          R=".reports/graph-validation/validation-report.json"
          HEALTH_SCORE=$(jq -r '.healthScore.overall' "$R")
          echo "HEALTH_SCORE=$HEALTH_SCORE" >> "$GITHUB_ENV"
          if [ "$HEALTH_SCORE" -lt "$MIN_HEALTH_SCORE" ]; then
            echo "HEALTH_STATUS=CRITICAL" >> "$GITHUB_ENV"
          elif [ "$HEALTH_SCORE" -lt "$ALERT_HEALTH_SCORE" ]; then
            echo "HEALTH_STATUS=WARNING" >> "$GITHUB_ENV"
          else
            echo "HEALTH_STATUS=HEALTHY" >> "$GITHUB_ENV"
          fi
          echo "P0_STATUS=PASS" >> "$GITHUB_ENV"
          echo "TENANT_STATUS=SECURE" >> "$GITHUB_ENV"

      - name: Upload validation reports
        if: env.DATABASE_URL != ''
        uses: actions/upload-artifact@v4
        with:
          name: graph-validation-reports
          path: .reports/graph-validation
          retention-days: 30

      - name: Workflow summary - Health Check Results
        if: env.DATABASE_URL != ''
        run: |
          echo "## Graph Validation Health Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Overall Status" >> $GITHUB_STEP_SUMMARY
          echo "- Health Score: **$HEALTH_SCORE/100** (Status: **$HEALTH_STATUS**)" >> $GITHUB_STEP_SUMMARY
          echo "- P0 Validation: **$P0_STATUS**" >> $GITHUB_STEP_SUMMARY
          echo "- Tenant Isolation: **$TENANT_STATUS**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Generated Reports" >> $GITHUB_STEP_SUMMARY
          echo "- 📋 Health Check Summary (text)" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 validation-report.json — **source of truth** (policy, healthScore, orphans, tenantLeaks)" >> $GITHUB_STEP_SUMMARY
          echo "- 📁 FK Catalog Export" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Thresholds" >> $GITHUB_STEP_SUMMARY
          echo "- Minimum Health Score: **$MIN_HEALTH_SCORE/100**" >> $GITHUB_STEP_SUMMARY
          echo "- Alert Threshold: **$ALERT_HEALTH_SCORE/100**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Download: graph-validation-reports" >> $GITHUB_STEP_SUMMARY
