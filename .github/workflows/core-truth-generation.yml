name: core-truth-generation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @afenda/core typecheck
      - run: pnpm --filter @afenda/core test
      - run: pnpm --filter @afenda/core test:truth-guards
      - run: pnpm --filter @afenda/core check:generate
      - run: pnpm --filter @afenda/core check:catalogs
      - run: pnpm --filter @afenda/core evidence:catalogs
      - run: pnpm --filter @afenda/core verify:truth

      - name: Upload truth artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-truth-artifacts
          path: packages/core/artifacts/truth
          if-no-files-found: warn
