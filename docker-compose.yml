version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: afenda-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: afenda
      POSTGRES_PASSWORD: afenda-dev-password
      POSTGRES_DB: afenda
      POSTGRES_INITDB_ARGS: "--locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afenda"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - afenda-net

  redis:
    image: redis:7-alpine
    container_name: afenda-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - afenda-net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  afenda-net:
    driver: bridge
