    <!--
      Cache Strategy (configure via server/CDN headers):
      - index.html: no-cache or max-age=0 (prevents stale chunk references)
      - /assets/*: max-age=31536000, immutable (hashed filenames)
      
      CSP Consideration:
      For strict CSP deployments:
      1. Add nonce to <script> tags via custom plugin
      2. Set build.assetsInlineLimit: 0 in vite.config.ts
      3. Configure Content-Security-Policy header on server
         Example: script-src 'self' 'nonce-{random}'; style-src 'self' 'unsafe-inline'
    -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
